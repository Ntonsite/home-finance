global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client  50s
    timeout server  50s

frontend http_front
    bind *:80
    
    # Define ACLs for routing this application
    acl is_api path_beg /api
    acl is_homefinance path_beg /homefinance
    
    # You can add more ACLs here for other services you want to host
    # acl is_other_app hdr(host) -i otherapp.example.com
    # use_backend other_backend if is_other_app

    # Use backends based on ACLs
    use_backend api_backend if is_api
    use_backend web_frontend if is_homefinance
    
    # Default backend for the Homeportal frontend app (fallback for root /)
    default_backend web_frontend

backend web_frontend
    server frontend frontend:80 check

backend api_backend
    server backend backend:3000 check

# Example backend for another service
# backend other_backend
#     server other_service other_container:8080 check
