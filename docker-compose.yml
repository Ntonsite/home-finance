services:
  haproxy:
    image: haproxy:2.8-alpine
    container_name: homeportal-haproxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: homeportal-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homeportal_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homeportal_password}
      POSTGRES_DB: ${POSTGRES_DB:-homeportal_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homeportal_user} -d ${POSTGRES_DB:-homeportal_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homeportal-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-homeportal_user}:${POSTGRES_PASSWORD:-homeportal_password}@postgres:5432/${POSTGRES_DB:-homeportal_db}?schema=public
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey}
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homeportal-frontend
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
